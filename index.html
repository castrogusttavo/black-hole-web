<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Hole Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <nav id="toolbar">
      <button id="btn-2d" class="tab active">2D Lensing</button>
      <button id="btn-3d" class="tab">3D Black Hole</button>
      <div id="controls">
        <label id="gravity-label" style="display:none;">
          <input type="checkbox" id="toggle-gravity"> Gravity (G)
        </label>
        <label id="grid-label" style="display:none;">
          <input type="checkbox" id="toggle-grid" checked> Grid
        </label>
        <span id="fps-display">FPS: --</span>
      </div>
    </nav>
    <canvas id="canvas"></canvas>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
